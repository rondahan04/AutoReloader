<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #333;
    }
    p {
      margin: 10px 0;
      font-size: 14px;
      color: #666;
      line-height: 1.5;
    }
    .status {
      margin-top: 15px;
      padding: 10px;
      background-color: #e8f5e9;
      border-radius: 4px;
      font-size: 12px;
      color: #2e7d32;
    }
    .url-list {
      margin: 10px 0;
      font-size: 12px;
      color: #555;
    }
    .url-list li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>Auto Reloader for RUNI</h1>
  <p>This extension automatically refreshes RUNI and Moodle pages every 10 minutes to keep your session alive.</p>
  
  <div class="url-list">
    <strong>Monitored URLs:</strong>
    <ul>
      <li>my.runi.ac.il</li>
      <li>moodle.runi.ac.il</li>
      <li>yedion.runi.ac.il</li>
    </ul>
  </div>
  
  <div class="status">
    ✓ Extension is active and monitoring tabs
  </div>
</body>
</html>
